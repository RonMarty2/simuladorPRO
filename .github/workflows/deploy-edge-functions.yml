name: Deploy Supabase Edge Functions

# Se ejecuta automáticamente en cada push a main.
# No requiere instalar nada localmente.
# Setea el secret WEBAPP_API_KEY via API (no necesita Vault de pago).

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-edge-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setear secret WEBAPP_API_KEY en Supabase (via Management API)
        run: |
          curl -sS -X POST \
            "https://api.supabase.com/v1/projects/${{ secrets.SUPABASE_PROJECT_REF }}/secrets" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '[{"name":"WEBAPP_API_KEY","value":"_RjDBe0cYazoqIHPX073KOHg0osP8IUgqidID3IIuHdySuH2ouv3RFnb9h31A41M"}]'
          echo "✓ WEBAPP_API_KEY seteado en Supabase"
        continue-on-error: true

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy export-artifact
        run: |
          supabase functions deploy export-artifact \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

